name: Bug Report
description: Report a bug in SmokedMeat
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix it.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `make quickstart`
        2. Enter token
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or screenshots.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: SmokedMeat version or commit hash
      placeholder: e.g. v0.1.0 or abc1234
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Counter (TUI)
        - Kitchen (Teamserver)
        - Brisket (Implant)
        - Quickstart / Docker
        - Other
  - type: input
    id: os
    attributes:
      label: OS / Environment
      placeholder: e.g. macOS 15.3, Ubuntu 24.04, WSL2
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (logs, terminal size, Docker version, etc.)
