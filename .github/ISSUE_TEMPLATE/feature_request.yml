name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for SmokedMeat? We'd love to hear it.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do? What's missing or frustrating?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Counter (TUI)
        - Kitchen (Teamserver)
        - Brisket (Implant)
        - Deployment / Infrastructure
        - Documentation
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, references, or related issues.
