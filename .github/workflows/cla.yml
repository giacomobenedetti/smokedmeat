name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: "https://github.com/boostsecurityio/smokedmeat/blob/main/CLA.md"
          path-to-signatures: "cla.json"
          branch: "cla-signatures" # orphan branch used as signature database
          allowlist: dependabot[bot]
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign our [Contributor License Agreement](https://github.com/boostsecurityio/smokedmeat/blob/main/CLA.md).

            To sign, please comment on this PR with the following exact text:

            > I have read the CLA Document and I hereby sign the CLA

            You retain full ownership of your contribution. The CLA grants boostsecurity.io the rights needed to include your work in both the open source project and our commercial offerings. See [CONTRIBUTING.md](https://github.com/boostsecurityio/smokedmeat/blob/main/CONTRIBUTING.md) for details.
          custom-allsigned-prcomment: "All contributors have signed the CLA. :white_check_mark:"
