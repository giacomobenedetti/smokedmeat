# Kitchen Server Configuration Example
# Copy this to kitchen.yaml and customize

# HTTP server settings
server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

# NATS connection settings
nats:
  url: nats://localhost:4222
  name: smokedmeat-kitchen
  connect_timeout: 10s
  reconnect_wait: 2s
  max_reconnects: 60

# JetStream settings
jetstream:
  stream_name: SMOKEDMEAT
  max_age: 24h
  storage: file

# Logging settings
logging:
  level: info
  format: json
