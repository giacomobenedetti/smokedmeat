# NATS Server Configuration for SmokedMeat Kitchen

# Server name for identification
server_name: smokedmeat-nats

# Client port
port: 4222

# HTTP monitoring port
http_port: 8222

# JetStream configuration
jetstream {
  # Storage directory for persistent data
  store_dir: /data/jetstream

  # Maximum memory storage
  max_mem: 256MB

  # Maximum file storage
  max_file: 1GB
}

# Logging
debug: false
trace: false
logtime: true

# Connection limits
max_connections: 1000
max_payload: 1MB

# Write deadline for slow clients
write_deadline: 10s
