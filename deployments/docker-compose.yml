services:
  # Caddy reverse proxy with automatic TLS
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"     # HTTP (redirects to HTTPS)
      - "443:443"   # HTTPS with auto-TLS
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - kitchen
    restart: unless-stopped

  # NATS JetStream - internal only, no external ports
  nats:
    image: nats:scratch@sha256:30c913e575318c477aa3a81da3f71a00a518e7091d6219d75c8b157e5844f92c
    command: ["-js", "-c", "/nats.conf"]
    # No external ports - only accessible within Docker network
    expose:
      - "4222"
      - "8222"
    volumes:
      - nats-data:/data
      - ../configs/nats.conf:/nats.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Init container to fix volume permissions (runs once)
  kitchen-init:
    image: cgr.dev/chainguard/busybox@sha256:ecc152fe3dece44e60d1aa0fbbefb624902b4af0e2ed8c2c84dfbce653ff064f
    user: root
    command: ["sh", "-c", "chown -R 65532:65532 /data"]
    volumes:
      - kitchen-data:/data

  # Kitchen C2 server - internal only, accessed via Caddy
  kitchen:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.kitchen
    # No external ports - only accessible via Caddy
    expose:
      - "8080"
    environment:
      - NATS_URL=nats://nats:4222
      - KITCHEN_PORT=8080
      - KITCHEN_DB_PATH=/data/kitchen.db
      - AUTH_MODE=${AUTH_MODE:-ssh}
      - AUTH_TOKEN=${AUTH_TOKEN:-}
    volumes:
      - kitchen-data:/data
      - ~/.smokedmeat:/home/git/.smokedmeat:ro
    depends_on:
      kitchen-init:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  nats-data:
  kitchen-data:
